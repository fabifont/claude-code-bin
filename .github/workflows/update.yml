name: Update and publish Claude Code

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/update.yml
      - .SRCINFO
      - .nvchecker.toml
      - PKGBUILD
      - update-version.sh
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  group: update-claude-code
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  AUR_PKGBASE: claude-code

jobs:
  update:
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
      - name: Install tools
        run: pacman -Syu --noconfirm --needed actionlint curl devtools git jq namcap nvchecker openssh shellcheck sudo

      - uses: actions/checkout@v4

      - name: Prepare build user
        run: |
          useradd -m builder
          chown -R builder:builder "$GITHUB_WORKSPACE"
          install -d -o builder -g builder /tmp/claude-code-src /tmp/claude-code-build /tmp/claude-code-pkg
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Check upstream version
        id: version
        if: github.event_name != 'push'
        run: |
          set +e
          sudo -Eu builder pkgctl version check --format json | tee /tmp/pkgctl-version.json
          status=${PIPESTATUS[0]}
          set -e

          if (( status != 0 && status != 2 )); then
            exit "$status"
          fi

          if jq -e '
            any(
              .[];
              (.status != "success")
              and (
                .status != "warning"
                or .message != "local version is newer than upstream"
              )
            )
          ' /tmp/pkgctl-version.json >/dev/null; then
            jq -r '
              .[]
              | select(
                  (.status != "success")
                  and (
                    .status != "warning"
                    or .message != "local version is newer than upstream"
                  )
                )
              | "\(.pkgbase): \(.message // "version check failed")"
            ' /tmp/pkgctl-version.json >&2
            exit 1
          fi

          if jq -e 'any(.[]; (.local_version // "") != (.upstream_version // ""))' /tmp/pkgctl-version.json >/dev/null; then
            echo "version_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "version_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run updater
        if: steps.version.outputs.version_changed == 'true'
        run: sudo -Eu builder ./update-version.sh

      - name: Check generated update
        id: update
        if: steps.version.outputs.version_changed == 'true'
        run: |
          if git diff --quiet -- PKGBUILD .SRCINFO; then
            echo "::error::pkgctl detected upstream version drift, but update-version.sh did not change PKGBUILD or .SRCINFO."
            exit 1
          fi

          pkgver="$(awk -F= '/^pkgver=/{print $2}' PKGBUILD)"
          echo "pkgver=${pkgver}" >> "$GITHUB_OUTPUT"

      - name: Validate package
        if: github.event_name == 'push' || steps.version.outputs.version_changed == 'true'
        run: |
          shellcheck --shell=bash --exclude=SC2034,SC2154,SC2164 PKGBUILD update-version.sh
          actionlint .github/workflows/update.yml
          sudo -Eu builder bash -lc 'cmp .SRCINFO <(makepkg --printsrcinfo)'
          sudo -Eu builder env SRCDEST=/tmp/claude-code-src BUILDDIR=/tmp/claude-code-build makepkg --verifysource
          sudo -Eu builder env CARCH=aarch64 SRCDEST=/tmp/claude-code-src BUILDDIR=/tmp/claude-code-build makepkg --verifysource
          sudo -Eu builder env SRCDEST=/tmp/claude-code-src BUILDDIR=/tmp/claude-code-build PKGDEST=/tmp/claude-code-pkg makepkg -f
          pacman -U --noconfirm /tmp/claude-code-pkg/*.pkg.tar.zst
          DISABLE_UPDATES=1 DISABLE_AUTOUPDATER=1 claude --version
          namcap PKGBUILD
          namcap /tmp/claude-code-pkg/*.pkg.tar.zst

      - name: Commit package update
        if: steps.version.outputs.version_changed == 'true'
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          PKGVER: ${{ steps.update.outputs.pkgver }}
        run: |
          if [[ "$GITHUB_REF_NAME" != "$DEFAULT_BRANCH" ]]; then
            echo "::error::Refusing to publish from ${GITHUB_REF_NAME}; expected ${DEFAULT_BRANCH}."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add PKGBUILD .SRCINFO
          git commit -m "Update ${AUR_PKGBASE} to ${PKGVER}"

      - name: Push package update to GitHub
        if: steps.version.outputs.version_changed == 'true'
        run: git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Publish to AUR
        if: github.event_name == 'push' || steps.version.outputs.version_changed == 'true'
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          AUR_SSH_PASSPHRASE: ${{ secrets.AUR_SSH_PASSPHRASE }}
          PKGVER: ${{ steps.update.outputs.pkgver }}
        run: |
          if [[ -z "${AUR_SSH_PRIVATE_KEY}" ]]; then
            echo "::error::AUR_SSH_PRIVATE_KEY secret is required to publish to AUR."
            exit 1
          fi

          install -dm700 ~/.ssh
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          printf '%s\n' 'aur.archlinux.org ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEuBKrPzbawxA/k2g6NcyV5jmqwJ2s+zpgZGZ7tpLIcN' > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          {
            printf 'Host aur.archlinux.org\n'
            printf '  IdentityFile ~/.ssh/aur\n'
            printf '  User aur\n'
            printf '  IdentitiesOnly yes\n'
          } > ~/.ssh/config
          chmod 600 ~/.ssh/config

          aur_url="ssh://aur@aur.archlinux.org/${AUR_PKGBASE}.git"
          aur_dir="$(mktemp -d)"

          if [[ -n "${AUR_SSH_PASSPHRASE}" ]]; then
            eval "$(ssh-agent -s)"
            trap 'ssh-agent -k >/dev/null' EXIT
            askpass="$(mktemp)"
            cat > "$askpass" <<'EOF'
          #!/bin/sh
          printf '%s\n' "$AUR_SSH_PASSPHRASE"
          EOF
            chmod 700 "$askpass"
            DISPLAY=:0 SSH_ASKPASS="$askpass" SSH_ASKPASS_REQUIRE=force ssh-add "${HOME}/.ssh/aur" </dev/null
            export GIT_SSH_COMMAND="ssh -o UserKnownHostsFile=${HOME}/.ssh/known_hosts -o StrictHostKeyChecking=yes -o HostKeyAlias=aur.archlinux.org"
            ssh -o UserKnownHostsFile="${HOME}/.ssh/known_hosts" -o StrictHostKeyChecking=yes -o HostKeyAlias=aur.archlinux.org aur@aur.archlinux.org help >/dev/null
          else
            export GIT_SSH_COMMAND="ssh -i ${HOME}/.ssh/aur -o IdentitiesOnly=yes -o UserKnownHostsFile=${HOME}/.ssh/known_hosts -o StrictHostKeyChecking=yes -o HostKeyAlias=aur.archlinux.org"
            ssh -i "${HOME}/.ssh/aur" -o IdentitiesOnly=yes -o UserKnownHostsFile="${HOME}/.ssh/known_hosts" -o StrictHostKeyChecking=yes -o HostKeyAlias=aur.archlinux.org aur@aur.archlinux.org help >/dev/null
          fi

          package_files=(.nvchecker.toml PKGBUILD .SRCINFO update-version.sh)

          git -c init.defaultBranch=master clone "$aur_url" "$aur_dir"
          cp "${package_files[@]}" "$aur_dir/"

          git -C "$aur_dir" config user.name "github-actions[bot]"
          git -C "$aur_dir" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$aur_dir" add "${package_files[@]}"

          if git -C "$aur_dir" diff --cached --quiet; then
            echo "AUR repository is already up to date."
            exit 0
          fi

          if [[ -z "${PKGVER}" ]]; then
            PKGVER="$(awk -F= '/^pkgver=/{print $2}' PKGBUILD)"
          fi

          if [[ "${{ github.event_name }}" == "push" ]]; then
            commit_message="Sync ${AUR_PKGBASE} packaging"
          else
            commit_message="Update ${AUR_PKGBASE} to ${PKGVER}"
          fi

          git -C "$aur_dir" commit -m "$commit_message"
          git -C "$aur_dir" push origin HEAD:master
